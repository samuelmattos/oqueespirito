  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      background: #16213e;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    main {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 56px);
    }

    .pdf-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    iframe.pdf-viewer {
      width: 100%;
      flex: 1;
      border: none;
      background: #fff;
    }

    .fallback {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 20px;
      padding: 40px 24px;
      text-align: center;
    }

    .fallback p {
      font-size: 1.1rem;
      color: #ccc;
      max-width: 480px;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      background: #e94560;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #c73652;
    }
